name: Build Third Party Filters
on:
  push:
    branches:
      - master
    tags-ignore:
      - "**"
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - "**/*.gitignore"
      - .editorconfig
      - docs/**
      - src/** # we only cares about "scripts/" changes
  pull_request: null
  schedule:
    - cron: "17 2 * * *"
    - cron: "17 6 * * *"
    - cron: "17 10 * * *"
    - cron: "17 14 * * *"
    - cron: "17 18 * * *"
    - cron: "17 22 * * *"
jobs:
  publish:
    name: Build Third Party Filters
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        id: setup_pnpm
        background: true
        with:
          run_install: false
          cache: true
      - uses: actions/setup-node@v6
        id: setup_node
        background: true
        with:
          node-version-file: ".node-version"
          check-latest: true
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"
      - wait: [setup_pnpm, setup_node]
      - run: pnpm config set --location=global minimumReleaseAge 0
      - run: pnpm install
      - run: pnpm run build-3p-filters
      - uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: SukkaLab/filters.cdn.skk.moe
          publish_branch: master
          cname: filters.cdn.skk.moe
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          user_name: ${{ secrets.GIT_NAME }}
          user_email: ${{ secrets.GIT_EMAIL }}
          publish_dir: public
          keep_files: true
